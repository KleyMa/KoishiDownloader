name: music_downloader
description: "Media downloader app using yt-dlp and FFmpeg."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.5

  # FFmpeg
  ffmpeg_kit_flutter_new: any

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Localization
  easy_localization: ^3.0.7

  # Storage & Files
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2

  # Persistence
  shared_preferences: ^2.2.3

  # Utilities
  uuid: ^4.4.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
