name: koishi_downloader
description: "Koishi downloader app using yt-dlp and FFmpeg."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.5

  # FFmpeg (using ffmpeg_kit_flutter_new for JNI-based native conversion to bypass Android 16 execve linking issues)
  ffmpeg_kit_flutter_new: ^4.5.1

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Localization
  easy_localization: ^3.0.7
  
  # UI
  flutter_svg: ^2.0.10

  # Storage & Files
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2

  # Persistence
  shared_preferences: ^2.2.3

  # Utilities
  uuid: ^4.4.0
  open_filex: ^4.7.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
    - assets/images/
    - assets/images/logo/
    - assets/images/logo/android/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo/android/play_store_512.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/images/logo/android/res/mipmap-xxxhdpi/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/images/logo/android/play_store_512.png"